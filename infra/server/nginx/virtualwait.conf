# Replace wait.example.com before enabling.
# This reference host is HTTP-only so controlled intranet/test deployments do not
# require TLS. For Internet deployment, terminate TLS here or at an upstream
# proxy and keep the same sanitized forwarding headers below.
server {
    listen 80;
    listen [::]:80;
    server_name wait.example.com;

    client_max_body_size 8k;

    # Health probes run from the same host via 127.0.0.1. Do not turn this
    # process/SQLite readiness endpoint into an Internet-facing API.
    location = /api/healthz {
        return 404;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Never forward a client-provided address chain. Web trusts the first
        # X-Forwarded-For value only when TRUST_PROXY_HEADERS=true.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP "";

        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
