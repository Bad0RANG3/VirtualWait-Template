# Replace wait.example.com and TLS certificate paths before enabling.
# This is a reference virtual host; global nginx TLS defaults remain operator-owned.
server {
    listen 80;
    listen [::]:80;
    server_name wait.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wait.example.com;

    ssl_certificate     /etc/letsencrypt/live/wait.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wait.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;

    client_max_body_size 8k;

    # Health probes run from the same host via 127.0.0.1. Do not turn this
    # process/SQLite readiness endpoint into an Internet-facing API.
    location = /api/healthz {
        return 404;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Never forward a client-provided address chain. Web trusts the first
        # X-Forwarded-For value only when TRUST_PROXY_HEADERS=true.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP "";

        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
